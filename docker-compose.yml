version: '3.8'

services:
  # ── Message broker ──────────────────────────────────────────
  nats:
    image: nats:latest
    ports:
      - '4222:4222'
      - '8222:8222'

  # ── Bases de datos ───────────────────────────────────────────
  postgres-auth:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: auth_db
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - '5433:5432'
    volumes:
      - postgres_auth_data:/var/lib/postgresql/data

  postgres-accounts:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: accounts_db
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - '5434:5432'
    volumes:
      - postgres_accounts_data:/var/lib/postgresql/data

  postgres-transactions:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: transactions_db
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - '5435:5432'
    volumes:
      - postgres_transactions_data:/var/lib/postgresql/data

  # ── Servicios ────────────────────────────────────────────────
  api-gateway:
    build:
      context: .
      dockerfile: apps/api-gateway/Dockerfile
    ports:
      - '3000:3000'
    env_file:
      - apps/api-gateway/.env
    depends_on:
      - nats
      - auth-service
      - accounts-service
      - transactions-service

  auth-service:
    build:
      context: .
      dockerfile: apps/auth-service/Dockerfile
    env_file:
      - apps/auth-service/.env
    depends_on:
      - nats
      - postgres-auth

  accounts-service:
    build:
      context: .
      dockerfile: apps/accounts-service/Dockerfile
    env_file:
      - apps/accounts-service/.env
    depends_on:
      - nats
      - postgres-accounts

  transactions-service:
    build:
      context: .
      dockerfile: apps/transactions-service/Dockerfile
    env_file:
      - apps/transactions-service/.env
    depends_on:
      - nats
      - postgres-transactions

  notifications-service:
    build:
      context: .
      dockerfile: apps/notifications-service/Dockerfile
    env_file:
      - apps/notifications-service/.env
    depends_on:
      - nats

volumes:
  postgres_auth_data:
  postgres_accounts_data:
  postgres_transactions_data:
